# Render Blueprint — sync from repo root after linking GitHub.
# Dashboard: https://dashboard.render.com/project/prj-d9h7fl3tqb8s73c4kei0

services:
  - type: web
    name: ai-procurement-os
    repo: https://github.com/JamilPr1/AI-Procurement-OS
    branch: main
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.main dashboard --host 0.0.0.0
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: AUTO_APPROVE
        value: "true"
      - key: EMAIL_DRY_RUN
        value: "false"
      - key: CONTACT_EMAIL
        value: aarfa.developers@gmail.com
      - key: NOTIFY_EMAIL
        value: aarfa.developers@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: aarfa.developers@gmail.com
      - key: SMTP_FROM
        value: aarfa.developers@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DISCOVERY_MAX_CANDIDATES
        value: "30"
      - key: DISCOVERY_MAX_LEADS
        value: "12"
      - key: DISCOVERY_SKIP_CONTACT
        value: "true"
      - key: PIPELINE_PARALLEL_WORKERS
        value: "3"
